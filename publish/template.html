<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        .header p { color: #666; font-size: 14px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .qr-section { text-align: center; }
        .qr-section img { width: 180px; height: 180px; margin: 10px 0; }
        .url-text { background: #f0f0f0; padding: 10px; border-radius: 8px; font-family: monospace; word-break: break-all; font-size: 14px; color: #333; }
        .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #007AFF; background: #f8f9fa; }
        .upload-area.dragover { border-color: #007AFF; background: #e8f4ff; }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }
        .upload-text { color: #666; font-size: 14px; }
        .upload-text small { display: block; margin-top: 5px; color: #999; }
        #fileInput { display: block; margin: 10px auto; width: auto; max-width: 200px; }
        .file-name { margin-top: 10px; color: #666; font-size: 14px; }
        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-bar.active { display: block; }
        .progress-fill { height: 100%; background: #007AFF; width: 0%; transition: width 0.3s; }
        .status { text-align: center; padding: 10px; color: #666; font-size: 14px; display: none; }
        .status.show { display: block; }
        .status.success { color: #34C759; }
        .status.error { color: #ff3b30; }
        .file-list { margin-top: 20px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; }
        .file-info { flex: 1; }
        .file-name-item { font-weight: 500; color: #333; word-break: break-all; }
        .file-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .file-actions { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        .btn-download { background: #007AFF; color: white; }
        .btn-delete { background: #ff3b30; color: white; }
        .lang-switch { text-align: center; margin-bottom: 10px; font-size: 14px; }
        .lang-switch a, .lang-switch span { color: #007AFF; margin: 0 5px; text-decoration: none; }
        .lang-switch span { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">{{langLinks}}</div>
        <div class="header">
            <h1>{{title}}</h1>
            <p>{{subtitle}}</p>
        </div>
        <div class="card">
            <div class="qr-section">
                <div id="qrcode"><img src="{{qrcode}}" style="width:180px;height:180px;"></div>
                <div class="url-text" id="urlText">{{url}}</div>
            </div>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 15px;">{{uploadTitle}}</h3>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">{{uploadTip}}</div>
                <div style="margin: 10px 0;">
                    <label class="btn btn-select" for="fileInput" style="background: #34C759; color: white; padding: 8px 20px; border-radius: 6px; cursor: pointer;">{{selectFileText}}</label>
                    <input type="file" id="fileInput" style="display: none;">
                </div>
                <div style="text-align: center; margin: 10px 0; color: #666; font-size: 14px;" id="fileNameDisplay">{{noFileSelected}}</div>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="status" id="status"></div>
            </div>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">{{uploadedFiles}}</h3>
                <button class="btn btn-download" onclick="loadFiles()" style="padding: 4px 12px; font-size: 12px;">Refresh</button>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 15px;">{{helpTitle}}</h3>
            <div class="help-content" style="font-size: 14px; color: #666; line-height: 1.8;">
                <p>{{helpStep1}}</p>
                <p>{{helpStep2}}</p>
                <p>{{helpStep3}}</p>
                <p>{{helpStep4}}</p>
                <p style="margin-top: 10px; color: #999; font-size: 12px;">{{helpNote}}</p>
            </div>
        </div>
    </div>
    <script>
        var i18n = {
            download: '{{download}}',
            delete: '{{deleteBtn}}',
            confirmDelete: '{{confirmDelete}}',
            uploading: '{{uploading}}',
            uploadSuccess: '{{uploadSuccess}}',
            uploadFailed: '{{uploadFailed}}',
            loading: '{{loading}}',
            noFiles: '{{noFiles}}',
            noFileSelected: '{{noFileSelected}}'
        };
        
        var selectedFile = null;
        
        async function loadFiles() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/files', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var files = JSON.parse(xhr.responseText);
                    var list = document.getElementById('fileList');
                    if (files.length === 0) {
                        list.innerHTML = '<p style="text-align: center; color: #999;">' + i18n.noFiles + '</p>';
                    } else {
                        var html = '';
                        for (var i = 0; i < files.length; i++) {
                            var f = files[i];
                            html += '<div class="file-item">' +
                                '<div class="file-info"><div class="file-name-item">' + f.name + '</div>' +
                                '<div class="file-meta">' + f.size + ' - ' + f.modified + '</div></div>' +
                                '<div class="file-actions">' +
                                '<a href="/download/' + encodeURIComponent(f.name) + '" class="btn btn-download">' + i18n.download + '</a>' +
                                '<button class="btn btn-delete" onclick="deleteFile(\'' + f.name + '\')">' + i18n.delete + '</button></div></div>';
                        }
                        list.innerHTML = html;
                    }
                }
            };
            xhr.onerror = function() {
                document.getElementById('fileList').innerHTML = '<p style="text-align: center; color: #f00;">Network error</p>';
            };
            xhr.send();
        }
        
        async function uploadFile(file) {
            var formData = new FormData();
            formData.append('file', file);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload');
            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percent = (e.loaded / e.total) * 100;
                    document.getElementById('progressFill').style.width = percent + '%';
                    document.getElementById('progressBar').classList.add('active');
                    document.getElementById('status').textContent = i18n.uploading + Math.round(percent) + '%';
                    document.getElementById('status').className = 'status show';
                }
            };
            xhr.onload = function() {
                document.getElementById('progressBar').classList.remove('active');
                if (xhr.status === 200) {
                    document.getElementById('status').textContent = i18n.uploadSuccess;
                    document.getElementById('status').className = 'status show success';
                    loadFiles();
                } else {
                    document.getElementById('status').textContent = i18n.uploadFailed + 'HTTP ' + xhr.status;
                    document.getElementById('status').className = 'status show error';
                }
            };
            xhr.onerror = function() {
                document.getElementById('progressBar').classList.remove('active');
                document.getElementById('status').textContent = i18n.uploadFailed + 'Network error';
                document.getElementById('status').className = 'status show error';
            };
            xhr.send(formData);
        }
        
        async function deleteFile(name) {
            if (!confirm(i18n.confirmDelete + name + '?')) return;
            await fetch('/delete/' + encodeURIComponent(name), {method: 'DELETE'});
            loadFiles();
        }
        
        var uploadArea = document.getElementById('uploadArea');
        var fileInput = document.getElementById('fileInput');
        var fileNameDisplay = document.getElementById('fileNameDisplay');
        
        fileInput.onchange = function() { 
            if (fileInput.files[0]) {
                selectedFile = fileInput.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                uploadFile(selectedFile);
            }
        };
        
        uploadArea.ondragover = function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); };
        uploadArea.ondragleave = function() { uploadArea.classList.remove('dragover'); };
        uploadArea.ondrop = function(e) { 
            e.preventDefault(); 
            uploadArea.classList.remove('dragover'); 
            if (e.dataTransfer.files[0]) {
                selectedFile = e.dataTransfer.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                uploadFile(selectedFile);
            }
        };
        
        loadFiles();
    </script>
</body>
</html>
